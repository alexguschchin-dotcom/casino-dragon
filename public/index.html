<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Драконья сокровищница</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>

        <div class="ui-panel">
            <div class="balance">
                <span class="label">💰 Баланс</span>
                <span class="value" id="balanceValue">1500000</span>
                <button id="applyBalance" class="btn-small">✎</button>
            </div>
            <div class="scales">
                <span class="label">✨ Чешуйки</span>
                <span class="value" id="scalesValue">0</span>
            </div>
            <button id="resetBtn" class="btn-reset">🔄 Новая игра</button>
        </div>

        <div id="log" class="log"></div>
    </div>

    <div id="taskModal" class="modal hidden">
        <div class="modal-content">
            <h2>Задание</h2>
            <p id="taskDesc"></p>
            <div class="input-group">
                <label>Новый баланс:</label>
                <input type="number" id="newBalance" step="100">
            </div>
            <div class="button-group">
                <button id="completeBtn" class="btn-success">✅ Выполнено</button>
                <button id="failBtn" class="btn-fail">💔 Провал</button>
            </div>
        </div>
    </div>

    <div id="winModal" class="modal hidden">
        <div class="modal-content">
            <h2>🏆 Дракон пробуждён</h2>
            <p>Вы собрали 30 чешуек!</p>
            <p>Итоговый баланс: <span id="finalBalance"></span></p>
            <button id="newGameBtn" class="btn-gold">🔄 Новая игра</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
