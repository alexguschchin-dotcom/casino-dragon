<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сказания о Золотом Драконе</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Goudy+Bookletter+1911&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="game-wrapper">
        <!-- Шапка -->
        <div class="top-bar">
            <div class="balance">
                <i class="fas fa-coins"></i>
                <span id="balance">1500000</span>
            </div>
            <div class="game-title">Сказания о Золотом Драконе</div>
            <div class="settings">
                <button id="apply-start-balance" class="btn-gold"><i class="fas fa-pen"></i></button>
                <button id="reset-btn" class="btn-gold"><i class="fas fa-redo-alt"></i></button>
            </div>
        </div>

        <!-- Карта -->
        <div class="map-container">
            <canvas id="mapCanvas" width="1200" height="600"></canvas>
            <div class="path-selector" id="path-selector" style="display: none;">
                <h3>Выберите путь</h3>
                <div class="path-buttons">
                    <button id="path-left" class="path-btn left">Левый путь</button>
                    <button id="path-center" class="path-btn center">Центральный путь</button>
                    <button id="path-right" class="path-btn right">Правый путь</button>
                </div>
            </div>
        </div>

        <!-- Панель текущего задания/комнаты -->
        <div class="room-panel" id="room-panel">
            <div class="room-name" id="room-name">Нажмите на карту</div>
            <div class="room-desc" id="room-desc"></div>
            <button id="action-btn" class="btn-action" disabled>Начать</button>
        </div>

        <!-- История -->
        <div class="log-panel">
            <div class="log-title"><i class="fas fa-scroll"></i> Хроники</div>
            <div id="log-list" class="log-list"></div>
        </div>
    </div>

    <!-- Модалка задания -->
    <div id="task-modal" class="modal hidden">
        <div class="modal-content">
            <h2><i class="fas fa-dragon"></i> Испытание</h2>
            <p id="task-description"></p>
            <div class="input-group">
                <label>Новый баланс:</label>
                <input type="number" id="new-balance" step="100">
            </div>
            <div class="modal-buttons">
                <button id="complete-task" class="btn-gold">✅ Выполнено</button>
                <button id="fail-task" class="btn-danger">💔 Провал</button>
            </div>
        </div>
    </div>

    <!-- Модалка окончания игры -->
    <div id="gameover-modal" class="modal hidden">
        <div class="modal-content">
            <h2><i class="fas fa-crown"></i> Итоги похода</h2>
            <p>Ваш итоговый баланс: <span id="final-balance"></span></p>
            <p>Пройдено этапов: <span id="final-steps"></span></p>
            <button id="new-game-btn" class="btn-gold">🔄 Новое путешествие</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
